<div class="container">
  <h1 class="main-title">Доступные курсы KBTU</h1>

  <div class="course-grid">
    @for (course of courses; track course.id) {
      <div class="course-card">
        <div class="card-header">
          <span class="category-tag">{{ course.category_name }}</span>
        </div>
        
        <h3>{{ course.title }}</h3>
        <p class="description">{{ course.description }}</p>
        
        <div class="card-footer">
          <button [routerLink]="['/course', course.id]" class="btn-more">
            Подробнее
          </button>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <p>Курсы загружаются или список пуст...</p>
      </div>
    }
  </div>
</div>
