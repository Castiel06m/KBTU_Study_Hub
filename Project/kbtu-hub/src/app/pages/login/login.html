<div class="login-container">
  <div class="login-box">
    <h2>Вход в KBTU Hub</h2>
    
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" [(ngModel)]="loginData.username" required>
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" required>
      </div>

      <button type="submit" class="btn-login">Войти</button>
    </form>
    
    <a href="#" (click)="$event.preventDefault();" style="display:block; margin-top:15px; font-size: 12px; color: #666;">
      Забыли пароль?
    </a>

    <div style="margin-top: 15px; text-align: center;">
      <span>Нет аккаунта? </span>
      <a routerLink="/register">Зарегистрироваться</a>
    </div>

  </div>
</div>
